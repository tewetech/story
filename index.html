<!DOCTYPE html>
<html lang="id" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story X | Tewe Tech</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tewetech/favicon/refs/heads/main/tewe.png">
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        darkMode: 'class',
    }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, #29b6d3 100%);
    background-attachment: fixed;
    margin: 0;
}
.canvas-font {
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}
::-webkit-scrollbar {
    width: 4px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(21, 94, 117, 0.2);
    border-radius: 10px;
}
@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}
.shimmer-box {
    position: relative;
    overflow: hidden;
}
.shimmer-box::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
    animation: shimmer 3s infinite;
    pointer-events: none;
    z-index: 10;
}
.glass-panel {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.7);
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
.custom-shadow {
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
}
.high-res-img {
    image-rendering: high-quality;
    image-rendering: -webkit-optimize-contrast;
}
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 transition-colors duration-300">

<button id="btnToggleTheme" class="fixed top-6 right-6 w-12 h-12 bg-white/70 text-[#155e75] rounded-2xl border border-white shadow-sm flex items-center justify-center backdrop-blur-md z-40 transition-all hover:bg-white hover:scale-105 active:scale-95">
    <svg id="iconSun" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    <svg id="iconMoon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
</button>

<div id="captureWrapper" class="canvas-font w-full max-w-[400px] aspect-[3/4] flex items-center justify-center bg-slate-800 dark:bg-[#e2e8f0] relative transition-colors duration-300">
    <div id="tweetCard" class="w-[85%] max-w-[260px] bg-white dark:bg-[#161a22] text-slate-900 dark:text-white p-3.5 shrink-0 rounded-[1rem] custom-shadow flex flex-col relative z-10 transition-colors duration-300">
        <div class="flex justify-between items-start mb-1.5">
            <div class="flex gap-1.5 items-start">
                <img id="outAvatar" class="w-7 h-7 min-w-[28px] min-h-[28px] aspect-square rounded-full object-cover bg-gray-200 dark:bg-gray-800 flex-shrink-0 high-res-img" alt="" crossorigin="anonymous">
                <div class="flex flex-col min-w-0">
                    <div class="flex items-center gap-1 flex-wrap">
                        <span id="outName" class="font-bold hover:underline cursor-pointer text-[11px] break-words"></span>
                    </div>
                    <span class="text-slate-500 dark:text-gray-500 text-[10px] break-words leading-tight">@<span id="outUsername"></span></span>
                </div>
            </div>
            <svg viewBox="0 0 24 24" class="w-3 h-3 fill-current text-slate-400 dark:text-gray-500 cursor-pointer flex-shrink-0 mt-0.5"><g><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></g></svg>
        </div>
        
        <div id="outText" class="text-[11px] leading-relaxed mb-1.5 whitespace-pre-wrap break-words"></div>
        
        <div id="outPostImageWrapper" class="w-full h-auto max-h-[180px] rounded-xl mb-1.5 hidden border border-slate-200 dark:border-gray-800 overflow-hidden shrink-0">
            <img id="outPostImage" class="w-full h-full object-cover object-center block high-res-img" alt="" crossorigin="anonymous">
        </div>
        
        <div class="text-slate-500 dark:text-gray-500 text-[10px] flex gap-1 items-center border-b border-slate-200 dark:border-gray-800 pb-1.5 mb-1 mt-1 flex-wrap transition-colors duration-300">
            <span id="outTime" class="hover:underline cursor-pointer"></span> · 
            <span id="outDate" class="hover:underline cursor-pointer"></span> · 
            <span class="text-slate-900 dark:text-white font-bold" id="outViews">1.2M</span> <span class="hover:underline cursor-pointer">Views</span>
        </div>
        
        <div class="flex gap-2.5 text-[10px] text-slate-500 dark:text-gray-500 border-b border-slate-200 dark:border-gray-800 pb-1.5 mb-1.5 flex-wrap transition-colors duration-300">
            <div class="flex gap-1 items-center"><span id="outReposts" class="text-slate-900 dark:text-white font-bold">45K</span> Reposts</div>
            <div class="flex gap-1 items-center"><span id="outQuotes" class="text-slate-900 dark:text-white font-bold">12K</span> Quotes</div>
            <div class="flex gap-1 items-center"><span id="outLikes" class="text-slate-900 dark:text-white font-bold">150K</span> Likes</div>
        </div>
        
        <div class="flex justify-between text-slate-500 dark:text-gray-500 px-0.5 mt-0.5 transition-colors duration-300">
            <div class="flex items-center gap-1"><svg viewBox="0 0 24 24" class="w-[13px] h-[13px] fill-current"><g><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path></g></svg></div>
            <div class="flex items-center gap-1"><svg viewBox="0 0 24 24" class="w-[13px] h-[13px] fill-current"><g><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"></path></g></svg></div>
            <div class="flex items-center gap-1"><svg viewBox="0 0 24 24" class="w-[13px] h-[13px] fill-current"><g><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></g></svg></div>
            <div class="flex items-center gap-1 text-[#1d9bf0]"><svg viewBox="0 0 24 24" class="w-[13px] h-[13px] fill-current"><g><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"></path></g></svg></div>
            <div class="flex items-center gap-1"><svg viewBox="0 0 24 24" class="w-[13px] h-[13px] fill-current"><g><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"></path></g></svg></div>
        </div>
    </div>
</div>

<button id="btnOpenModal" class="fixed bottom-6 right-6 w-14 h-14 bg-[#155e75] rounded-[20px] shadow-lg shadow-[#155e75]/30 flex items-center justify-center text-white hover:scale-[1.05] active:scale-95 transition-transform z-40">
    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
</button>

<div id="modalContainer" class="fixed inset-0 z-50 hidden bg-[#155e75]/40 backdrop-blur-sm items-center justify-center p-4 transition-opacity">
    <div class="bg-[#f4fbff] border border-white/60 p-6 rounded-[35px] shadow-2xl w-full max-w-[400px] flex flex-col relative overflow-hidden animate-[fadeIn_0.3s_ease-out]">
        
        <div class="absolute -top-10 -right-10 w-64 h-64 bg-gradient-to-br from-[#38bdf8] to-[#0369a1] rounded-full blur-3xl opacity-30 pointer-events-none"></div>
        <div class="absolute top-40 -left-20 w-72 h-72 bg-[#7dd3fc] rounded-full blur-3xl opacity-40 pointer-events-none"></div>
        <div class="absolute -bottom-20 right-0 w-80 h-80 bg-[#bae6fd] rounded-full blur-3xl opacity-50 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col w-full h-full">
            <button id="btnCloseModal" class="absolute top-0 right-0 text-[#155e75]/60 hover:text-rose-500 bg-white/60 p-1.5 rounded-xl transition-all shadow-sm cursor-pointer">
                <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            
            <h2 class="text-[#155e75] text-lg font-semibold text-center mb-6 tracking-wide">Kustomisasi</h2>
            
            <div class="flex flex-col gap-4 overflow-y-auto max-h-[60vh] p-2">
                <div class="grid grid-cols-2 gap-3 px-1.5">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-medium px-2 text-[#155e75]/80">Nama :</label>
                        <input type="text" id="inName" class="w-full h-11 block glass-panel bg-transparent px-4 rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#38bdf8]/50 transition-all text-xs shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] placeholder-[#155e75]/50" placeholder="Tri Wantoro">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-medium px-2 text-[#155e75]/80">Username :</label>
                        <input type="text" id="inUsername" class="w-full h-11 block glass-panel bg-transparent px-4 rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#38bdf8]/50 transition-all text-xs shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] placeholder-[#155e75]/50" placeholder="tewetech.id">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 px-1.5">
                    <div class="flex flex-col gap-1.5">
                        <label class="bg-white/70 hover:bg-white text-[#155e75] border border-white font-medium h-11 px-2 rounded-2xl cursor-pointer text-xs flex items-center justify-center w-full transition-all duration-200 shadow-sm hover:shadow-md hover:scale-[1.03] active:scale-95 text-center">
                            Foto Profil (Persegi)
                            <input type="file" id="inAvatarFile" accept="image/*" class="hidden">
                        </label>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="bg-white/70 hover:bg-white text-[#155e75] border border-white font-medium h-11 px-2 rounded-2xl cursor-pointer text-xs flex items-center justify-center w-full transition-all duration-200 shadow-sm hover:shadow-md hover:scale-[1.03] active:scale-95 text-center">
                            Gambar Post
                            <input type="file" id="inPostImageFile" accept="image/*" class="hidden">
                        </label>
                    </div>
                </div>
                
                <div class="flex flex-col gap-1.5 px-1.5">
                    <label class="text-[11px] font-medium px-2 text-[#155e75]/80">Pesan :</label>
                    <textarea id="inText" class="w-full block glass-panel bg-transparent p-4 rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#38bdf8]/50 transition-all text-xs resize-none min-h-[90px] shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] placeholder-[#155e75]/50" placeholder="Halo, saya Tri Wantoro, seorang frontend developer dan graphic designer. Ketik sesuatu di sini..."></textarea>
                </div>
                
                <div class="px-1.5">
                    <button id="btnDownload" class="w-full h-[40px] px-6 rounded-2xl bg-[#155e75] text-white font-medium hover:bg-[#0e7490] hover:scale-[1.01] transition-all duration-300 text-xs tracking-wide shadow-lg shadow-[#155e75]/20 flex items-center justify-center mt-2 shrink-0">
                        UNDUH
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const e = i => document.getElementById(i);
const mappings = {
    inName: 'outName',
    inUsername: 'outUsername',
    inText: 'outText'
};

e('btnToggleTheme').addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
});

window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    
    let hours = now.getHours();
    let minutes = now.getMinutes();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    minutes = minutes < 10 ? '0' + minutes : minutes;
    const strTime = hours + ':' + minutes + ' ' + ampm;
    
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const strDate = monthNames[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    
    e('outTime').textContent = strTime;
    e('outDate').textContent = strDate;

    for (const [inputID, outputID] of Object.entries(mappings)) {
        const inp = e(inputID);
        const out = e(outputID);
        out.textContent = inp.placeholder;
        
        inp.addEventListener('input', ev => {
            out.textContent = ev.target.value || ev.target.placeholder;
        });
    }
});

e('btnOpenModal').addEventListener('click', () => {
    const modal = e('modalContainer');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
});

e('btnCloseModal').addEventListener('click', () => {
    const modal = e('modalContainer');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
});

e('inAvatarFile').addEventListener('change', ev => {
    const file = ev.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = event => {
            e('outAvatar').src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
});

e('inPostImageFile').addEventListener('change', ev => {
    const file = ev.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = event => {
            const img = e('outPostImage');
            img.src = event.target.result;
            e('outPostImageWrapper').classList.remove('hidden');
            e('outPostImageWrapper').classList.add('block');
        };
        reader.readAsDataURL(file);
    }
});

e('btnDownload').addEventListener('click', () => {
    const element = e('captureWrapper');
    const btn = e('btnDownload');
    const avatar = e('outAvatar');
    const originalHTML = btn.innerHTML;
    
    btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
    btn.classList.add('shimmer-box');
    
    const originalMt = avatar.style.marginTop;
    avatar.style.marginTop = '7px';
    
    html2canvas(element, {
        backgroundColor: null,
        scale: 5,
        useCORS: true,
        allowTaint: true
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `story-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }).catch(() => {
        alert("Gagal mengunduh gambar.");
    }).finally(() => {
        avatar.style.marginTop = originalMt;
        btn.innerHTML = originalHTML;
        btn.classList.remove('shimmer-box');
    });
});
</script>
</body>
</html>
